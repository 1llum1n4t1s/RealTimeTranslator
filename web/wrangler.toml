# RealTimeTranslator ランディングページ配信 Worker。
# rtt.nephilim.jp は R2 バケット realtimetranslator-updates のカスタムドメイン。
# 下のルートを被せると Worker が Custom Domain より優先され、worker.js が
# "/" のみランディングページを返し、それ以外のパスは R2 にそのまま委譲する。
name = "rtt-landing"
main = "worker.js"
compatibility_date = "2026-05-01"

routes = [
  { pattern = "rtt.nephilim.jp/*", zone_name = "nephilim.jp" },
]

# index.html を文字列として worker.js に import する（Text モジュール）。
[[rules]]
type = "Text"
globs = ["**/*.html"]
