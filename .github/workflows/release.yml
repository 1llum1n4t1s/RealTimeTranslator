name: Release
on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  version:
    name: Prepare version string
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Output version string
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

  velopack:
    needs: [build, version]
    name: Velopack
    uses: ./.github/workflows/velopack.yml
    with:
      version: ${{ needs.version.outputs.version }}

  r2-upload:
    needs: [velopack, version]
    name: R2 Upload
    runs-on: ubuntu-latest
    # 配信元は Cloudflare R2 単独。GitHub Releases は作らないため contents: write は不要。
    permissions:
      contents: read
    steps:
      - name: Download Velopack artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: velopack.*
          path: packages
          merge-multiple: true
      - name: List artifacts
        run: ls -lh packages/
      - name: Setup Node.js (wrangler 4.x requires Node >=22)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install wrangler CLI
        # サプライチェーン保護のため明示的にバージョン固定 (Velopack 同様、浮動バージョンは使わない)。
        run: npm install -g wrangler@4.93.0
      - name: Upload to R2 bucket (realtimetranslator-updates)
        # 同名 releases.win-x64.json は冪等に上書き、過去バージョンの nupkg は触らず維持 (delta 更新のため残す)。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          uploaded=0
          for f in packages/*; do
            name=$(basename "$f")
            echo "::group::Upload $name"
            wrangler r2 object put "realtimetranslator-updates/$name" --file="$f" --remote
            echo "::endgroup::"
            uploaded=$((uploaded + 1))
          done
          echo "✅ R2 アップロード完了: $uploaded ファイル"
      - name: Verify delivery (releases.win-x64.json の HTTP 200 を検証)
        run: |
          set -euo pipefail
          url="https://rtt.nephilim.jp/releases.win-x64.json"
          curl --fail --silent --show-error --max-time 30 \
               --retry 3 --retry-delay 5 --retry-all-errors \
               -o /dev/null -w "HTTP %{http_code} (%{size_download} bytes)\n" \
               "$url"

  # ⚠️ 一時的な踏み台 job (R2 移行ワンタイム、 transfer-cf Step 11.5)。
  # 旧 GithubSource クライアント (≤1.0.15) 救済のため、 R2 対応版を GitHub Releases にも 1 回だけ
  # publish する。旧クライアントはこの release を latest として検出 → 更新 → 再起動後に
  # SimpleWebSource (R2) を見るようになる (2 段階アップデート)。
  # この踏み台 publish が完了したら、 main からこの job を削除して R2 単独配信に戻す。
  github-stepping-stone:
    needs: [velopack, version, r2-upload]
    name: GitHub Releases Stepping-stone (one-time)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Velopack artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: velopack.*
          path: velopack-packages
          merge-multiple: true
      - name: Create GitHub Release (踏み台)
        # 旧 GithubSource クライアントは latest release の releases.win-x64.json + nupkg を取得するため、
        # velopack-packages の全 asset (releases.win-x64.json / nupkg / Setup.exe / 等) を上げる。
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" -t "$VERSION" --generate-notes
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" velopack-packages/*
