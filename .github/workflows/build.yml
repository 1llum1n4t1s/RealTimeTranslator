name: Build
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Publish
        # WASAPI Process Loopback が必要なため win-x64 self-contained に固定。
        # GuardAgainstSettingsJsonInPublish Target が settings.json 混入を MSBuild レベルで拒否する。
        run: >
          dotnet publish src/RealTimeTranslator.UI/RealTimeTranslator.UI.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish
      - name: Verify executable
        shell: pwsh
        run: |
          $exePath = Join-Path "publish" "RealTimeTranslator.UI.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "publish が失敗: $exePath が見つかりません"
            exit 1
          }
          Write-Host "Build OK: $exePath ($(Get-Item $exePath | Select-Object -ExpandProperty Length) bytes)"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: realtimetranslator.win-x64
          path: publish/*
          retention-days: 3
