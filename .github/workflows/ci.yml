name: Continuous Integration
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-2022
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        # WASAPI Process Loopback が必要なため Windows / x64 専用ビルド。
        # -r win-x64 は packages.lock.json の RID 情報と整合させるため必須
        # (build.yml の publish -r win-x64 と統一して NU1004 lockfile drift を防止)。
        run: dotnet restore RealTimeTranslator.slnx -p:Configuration=Release -p:Platform=x64 -r win-x64
      - name: Build
        run: dotnet build RealTimeTranslator.slnx -c Release -p:Platform=x64 --no-restore
      - name: Test
        run: dotnet test src/RealTimeTranslator.Tests/RealTimeTranslator.Tests.csproj -c Release -p:Platform=x64 --no-build --logger "trx;LogFileName=test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 3
