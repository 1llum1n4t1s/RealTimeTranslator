name: Velopack
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  velopack:
    name: Velopack windows-x64
    runs-on: windows-2022
    steps:
      - name: Checkout sources
        # アイコン (icon/app.ico) を --icon に渡すためにチェックアウトする。
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            icon/app.ico
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: realtimetranslator.win-x64
          path: publish
      - name: Install Velopack CLI
        # vpk のバージョンを NuGet パッケージ (Velopack 1.0.1) に合わせて固定する。
        # サプライチェーン保護: 浮動バージョンだと vpk 側が侵害・更新された場合に気付けない。
        # Velopack 本体を更新したら、この --version も合わせて更新すること。
        run: dotnet tool install --global vpk --version 1.0.1
      - name: Create Velopack package
        run: >
          vpk pack
          --packId RealTimeTranslator
          --packVersion ${{ inputs.version }}
          --packTitle "RealTimeTranslator"
          --packAuthors "1llum1n4t1s"
          --mainExe RealTimeTranslator.UI.exe
          --packDir publish
          --outputDir artifacts
          --channel win-x64
          --icon icon/app.ico
          --shortcuts "StartMenu,Desktop"
      - name: Upload Velopack artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: velopack.windows-x64
          path: artifacts/*
          retention-days: 3
